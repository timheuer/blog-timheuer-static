name: Deploy Astro Blog to GitHub Pages

on:
    push:
        branches: [ main ]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build Astro
              run: npm run build

            - name: Prepare deploy directory
              run: |
                  mkdir -p _site/blog
                  cp -r dist/* _site/blog/
                  echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0;url=/blog/"></head><body><a href="/blog/">Redirecting...</a></body></html>' > _site/index.html

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v5
              with:
                  path: _site

    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5
